<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="author" content="yanny63">
    <meta name="description" content="A Gym App">
    <meta name="viewport" content="initial-scale=1.0, width=device-width">
        
    <title data-i18n="workouts:title"></title>

    <script src="https://unpkg.com/i18next@23/i18next.min.js" defer></script>
    <script src="https://unpkg.com/i18next-http-backend@2/i18nextHttpBackend.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js" defer></script>
    <script src="{{ url_for('static', filename='js/lang.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/workouts.js') }}" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/plugin/relativeTime.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/plugin/utc.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/locale/pl.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/locale/es.min.js" defer></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='pages/training.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='pages/workouts.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <nav class="top_nav">
      <div class="nav_container">
        <ul class="nav_links">
            <li><a href="/#home" data-i18n="common:home"></a></li>
            <li><a href="/training" data-i18n="common:training"></a></li>
            <li><a href="" data-i18n="common:exercise"></a></li>
            <li><a href="/calculator" data-i18n="common:calculator"></a></li>
            <li><a href="/timer" data-i18n="common:timer"></a></li>
        </ul>
      <div class="nav_buttons">
        <div class="nav-buttons-container">
          <div class="langs-container">
            <button class="langs-btn" data-i18n="common:lang"></button>
            <div class="langs not-visible"> 
              <button onclick="changeLanguage('pl')">Polski</button>
              <button onclick="changeLanguage('en')">English</button>
              <button onclick="changeLanguage('es')">Español</button>
            </div>
            </div>
            {% if not current_user.is_authenticated %} 
            <a href="{{ url_for('login') }}" data-i18n="common:login"></a>
            <a href="{{ url_for('register') }}" data-i18n="common:signup"></a>
            {% else %} 
            <a href="{{ url_for('logout') }}" data-i18n="common:logout"></a>
            {% endif %}
          </div>
        </div>
      </div>
      <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </nav>
    <main>
      <aside class="training-aside">
        <a class="isLink" href="/training" data-i18n="training:training"></a>
        <a class="isLink" href="" data-i18n="training:progress"></a>
        <a class="isLink" href="#" data-i18n="training:training_plans"></a>
        <a class="isLink" href="{{ url_for('goals') }}" data-i18n="training:goals"></a>
        <a class="isLink" href="" data-i18n="training:stats"></a>
      </aside>
      <article class="workouts-article">
        <div class="routines">
          {% for routine in routines %}
          <div class="routine">
            <div class="routine-image-wrapper">
              <img class="routine-image" src="{{ url_for('static', filename='images/' + routine.get('image')) }}" alt="image">
            </div>
            <div class="routine-body">
              <div class="routine-header">
                <h2>{{ routine.get("name") }}</h2>
                <span class="routine-difficulty">{{ routine.get("difficulty") }}</span>
              </div>
              <p>{{ routine.get("description") }}</p>
            </div>
          </div>
          {% endfor %}
        </div>
      </article>
    </main>
  </body>
</html>
