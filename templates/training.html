<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="yanny63">
        <meta name="description" content="A Gym App">
        <meta name="viewport" content="initial-scale=1.0, width=device-width">
        
        <title data-i18n="training:title"></title>

        
        <script src="https://unpkg.com/i18next@23/i18next.min.js" defer></script>
        <script src="https://unpkg.com/i18next-http-backend@2/i18nextHttpBackend.min.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js" defer></script>
        <script src="{{ url_for('static', filename='js/lang.js') }}" defer></script>
        <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
        <script src="{{ url_for('static', filename='js/training.js') }}" defer></script>

        <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
        <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('static', filename='pages/training.css') }}">
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <nav class="top_nav">
            <div class="nav_container">
                <ul class="nav_links">
                    <li><a href="/#home" data-i18n="common:home"></a></li>
                    <li><a href="#" data-i18n="common:training"></a></li>
                    <li><a href="" data-i18n="common:exercise"></a></li>
                    <li><a href="/calculator" data-i18n="common:calculator"></a></li>
                    <li><a href="/timer" data-i18n="common:timer"></a></li>
                </ul>
                <div class="nav_buttons">
                    <div class="nav-buttons-container">
                        <div class="langs-container">
                            <button class="langs-btn" data-i18n="common:lang"></button>
                            <div class="langs not-visible"> 
                                <button onclick="changeLanguage('pl')">Polski</button>
                                <button onclick="changeLanguage('en')">English</button>
                                <button onclick="changeLanguage('es')">Español</button>
                            </div>
                        </div>
                        <a href="{{ url_for('login') }}" data-i18n="common:login"></a>
                        <a href="{{ url_for('register') }}" data-i18n="common:signup"></a>
                    </div>
                </div>
            </div>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
        <main>
            <aside class="training-aside">
                <a class="isLink" href="" data-i18n="training:training"></a>
                <a class="isLink" href="" data-i18n="training:progress"></a>
                <a class="isLink" href="" data-i18n="training:training_plans"></a>
                <a class="isLink" href="" data-i18n="training:goals"></a>
                <a class="isLink" href="" data-i18n="training:stats"></a>
            </aside>
            <article class="training-article not-visible">
                <section id="todays-workout" class="section">
                    <div class="todays-workout-container">
                        <span id="span-date">2026-04-12</span>
                        <h1 data-i18n="training:todays-t"></h1>
                        <div class="training-info">
                            <h3 id="training-name">Trening A</h3>
                            <div class="training-exercises-container">
                                <div class="isTable">
                                    <div class="tableHeader">
                                        <div data-i18n="training:exercise"></div>
                                        <div data-i18n="training:sets"></div>
                                        <div data-i18n="training:reps"></div>
                                    </div>
                                    <div class="isLine"></div>

                                    <div class="rows">
                                        <div class="tableRow">
                                            <div class="rowItem">
                                                Bench Press
                                            </div>
                                            <div class="rowItem">
                                                3
                                            </div>
                                            <div class="rowItem">
                                                6
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <button class="startWorkout" data-i18n="training:start-workout"></button>
                            </div>
                        </div>
                    </div>
                    <div class="break"></div>
                </section>
                <div class="sectionBreak"></div>
                <section id="middle-section" class="section">
                    <div class="recent-activity-parent">
                        <h1 data-i18n="training:recent-activity"></h1>
                        <div class="recent-activity-container">
                            <div class="recent-activity">
                                <h3 class="recent-activity-header">Chest Day - Yesterday</h3>
                                <button class="recent-activity-button" data-i18n="training:check-details"></button>
                            </div>
                        </div>
                    </div>

                    <div class="break"></div>

                    <div class="current-goals">                                            
                        <h1 data-i18n="training:current-goals"></h1>
                        <div class="current-goals-container">
                            <div class="current-goal">
                                <span>Wycisnąć 100kg</span><button class="current-goal-check" data-i18n="training:done"></button>
                            </div>
                            <div class="current-goal">
                                <span>Wycisnąć 100kg</span><button class="current-goal-check" data-i18n="training:done"></button>
                            </div>
                        </div>
                    </div>

                    <div class="break"></div>

                    <div class="last-sessions">
                        <h1 data-i18n="training:last-sessions"></h1>
                        <div class="last-sessions-container">
                            <div class="isTable">
                                <div class="tableHeader">
                                    <div data-i18n="training:training"></div>
                                    <div data-i18n="training:date"></div>
                                </div>
                                <div class="isLine"></div>
                                <div class="rows">
                                    <div class="tableRow">
                                        <div class="rowItem">
                                            Chest Day
                                        </div>
                                        <div class="rowItem">
                                            2026-04-26
                                        </div>
                                    </div>
                                    <div class="tableRow">
                                        <div class="rowItem">
                                            Chest Day
                                        </div>
                                        <div class="rowItem">
                                            2026-04-26
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </article>

            <div class="loader">
                <div class="spinner"></div>
            </div>

        </main>
    </body>
</html>
